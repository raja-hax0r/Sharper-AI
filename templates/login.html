<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pariah's Mineshaft - Access Console</title>
    <!-- Outfit and VT323 Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=VT323&display=swap" rel="family">
    
    <style>
        :root {
            --bg-color: #0b0204;
            --border-color: #5a0e1b;
            --ruby-red: #e0115f;
            --text-primary: #ffffff;
            --text-muted: #887277;
            --panel-bg: rgba(20, 4, 8, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #1b0409 0%, #050102 100%);
            color: var(--text-primary);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .console-panel {
            background-color: var(--panel-bg);
            border: 3px solid var(--border-color);
            border-radius: 6px;
            padding: 2.2rem;
            box-shadow: 0 0 25px rgba(224, 17, 95, 0.15), inset 0 0 10px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .console-panel::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--ruby-red), transparent);
        }

        .header-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header-logo-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
            filter: drop-shadow(0 0 8px var(--ruby-red));
        }

        .title-text {
            font-family: 'VT323', monospace;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: var(--ruby-red);
            text-shadow: 0 0 8px rgba(224, 17, 95, 0.6);
            margin-bottom: 0.2rem;
        }

        .subtitle-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 1.4rem;
        }

        .form-label {
            display: block;
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            letter-spacing: 1px;
        }

        .form-input {
            width: 100%;
            background-color: #000;
            border: 2px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-input:focus {
            border-color: var(--ruby-red);
            box-shadow: 0 0 10px rgba(224, 17, 95, 0.3);
        }

        .btn-submit {
            width: 100%;
            background: #000;
            border: 2px solid var(--ruby-red);
            color: var(--ruby-red);
            font-family: 'VT323', monospace;
            font-size: 1.4rem;
            padding: 0.6rem;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: all 0.2s ease;
            box-shadow: 0 0 8px rgba(224, 17, 95, 0.2);
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background-color: var(--ruby-red);
            color: #fff;
            text-shadow: 0 0 5px #fff;
            box-shadow: 0 0 15px rgba(224, 17, 95, 0.5);
        }

        .btn-submit:disabled {
            border-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
            background: transparent;
        }

        .toggle-link-container {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .toggle-link {
            color: var(--ruby-red);
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.25rem;
            cursor: pointer;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }

        .error-message {
            background-color: rgba(224, 17, 95, 0.1);
            border: 1px solid var(--ruby-red);
            color: #ffccd5;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-bottom: 1.2rem;
            display: none;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="console-panel">
            <div class="header-section">
                <span class="header-logo-icon">⛏️</span>
                <h1 class="title-text" id="panel-title">ACCESS CONSOLE</h1>
                <p class="subtitle-text" id="panel-subtitle">PARIAH'S MINESHAFT GATEWAY</p>
            </div>

            <!-- Error Banner -->
            <div id="error-banner" class="error-message"></div>

            <!-- Form -->
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label class="form-label" for="username">USERNAME</label>
                    <input type="text" id="username" class="form-input" required autocomplete="username" minlength="3" placeholder="Enter username...">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">ACCESS KEY / PASSWORD</label>
                    <input type="password" id="password" class="form-input" required autocomplete="current-password" minlength="4" placeholder="Enter password...">
                </div>

                <button type="submit" id="submit-btn" class="btn-submit">ESTABLISH CONNECTION</button>
            </form>

            <div class="toggle-link-container">
                <span id="toggle-desc">First extraction session?</span>
                <a id="toggle-action" class="toggle-link" onclick="toggleMode()">Provision Account</a>
            </div>
        </div>
    </div>

    <script>
        let mode = 'login'; // 'login' or 'register'

        const errorBanner = document.getElementById('error-banner');
        const submitBtn = document.getElementById('submit-btn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const panelTitle = document.getElementById('panel-title');
        const panelSubtitle = document.getElementById('panel-subtitle');
        const toggleDesc = document.getElementById('toggle-desc');
        const toggleAction = document.getElementById('toggle-action');

        function toggleMode() {
            errorBanner.style.display = 'none';
            if (mode === 'login') {
                mode = 'register';
                panelTitle.innerText = 'PROVISION ACCOUNT';
                panelSubtitle.innerText = 'REGISTER MINER PERMIT';
                submitBtn.innerText = 'PROVISION PERMIT';
                toggleDesc.innerText = 'Already permitted?';
                toggleAction.innerText = 'Access Console';
            } else {
                mode = 'login';
                panelTitle.innerText = 'ACCESS CONSOLE';
                panelSubtitle.innerText = 'PARIAH\'S MINESHAFT GATEWAY';
                submitBtn.innerText = 'ESTABLISH CONNECTION';
                toggleDesc.innerText = 'First extraction session?';
                toggleAction.innerText = 'Provision Account';
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            errorBanner.style.display = 'none';
            submitBtn.disabled = true;

            const username = usernameInput.value;
            const password = passwordInput.value;
            const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Server connection failed');
                }

                // Authentication succeeded, redirect to home
                window.location.href = '/';
            } catch (err) {
                errorBanner.innerText = err.message.toUpperCase();
                errorBanner.style.display = 'block';
                submitBtn.disabled = false;
            }
        }
    </script>

</body>
</html>
